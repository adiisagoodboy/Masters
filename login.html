<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MSc Guide — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--accent:#5B52D0;--text:#1A2040;--text2:#5A6380;--border:rgba(180,190,240,.35);--err:#DC2626;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Outfit',system-ui,sans-serif;background:linear-gradient(145deg,#EBF0FF 0%,#F3ECFF 40%,#E8F5FF 80%,#FFF0F8 100%);background-attachment:fixed;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .wrap{width:100%;max-width:400px;padding:20px;}
  .card{background:rgba(255,255,255,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1.5px solid rgba(255,255,255,.9);border-radius:22px;padding:44px 38px;box-shadow:0 16px 48px rgba(80,70,200,.12);}
  .icon{font-size:2.8rem;text-align:center;margin-bottom:12px;}
  h1{font-size:1.5rem;font-weight:900;color:var(--text);text-align:center;margin-bottom:4px;letter-spacing:-.3px;}
  .sub{font-size:.86rem;color:var(--text2);text-align:center;margin-bottom:30px;}
  label{font-size:.76rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:7px;}
  input{width:100%;padding:13px 16px;font-size:1rem;border:1.5px solid var(--border);border-radius:11px;color:var(--text);background:rgba(255,255,255,.7);outline:none;transition:border .2s;font-family:inherit;}
  input:focus{border-color:var(--accent);background:rgba(255,255,255,.9);}
  input.shake{animation:shake .3s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .err{font-size:.82rem;color:var(--err);margin-top:8px;min-height:18px;text-align:center;}
  button{width:100%;margin-top:20px;padding:14px;background:linear-gradient(135deg,#5B52D0,#8B50D8);color:#fff;border:none;border-radius:11px;font-size:1.02rem;font-weight:700;cursor:pointer;transition:opacity .2s;font-family:inherit;box-shadow:0 4px 18px rgba(91,82,208,.3);}
  button:hover{opacity:.88;}
  .hint{font-size:.76rem;color:var(--text2);text-align:center;margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="icon">🎓</div>
    <h1>MSc Global Guide</h1>
    <p class="sub">Aditya's personal university research — private access only</p>
    <label for="name">Enter your name to continue</label>
    <input type="text" id="name" placeholder="Type your name…" autocomplete="off" autocapitalize="none" onkeydown="if(event.key==='Enter')tryLogin()">
    <div class="err" id="err"></div>
    <button onclick="tryLogin()">Continue →</button>
    <p class="hint">Access is restricted to invited viewers only.</p>
  </div>
</div>
<script>
function tryLogin() {
  const val = document.getElementById('name').value.trim().toLowerCase();
  const allowed = ['aditya', 'dad', 'appa', 'papa'];
  if (allowed.includes(val)) {
    sessionStorage.setItem('msc-auth', '1');
    const params = new URLSearchParams(location.search);
    const next = params.get('next');
    location.replace(next && next.startsWith('http') ? next : 'MSc_Global_Guide.html');
  } else {
    const inp = document.getElementById('name');
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    document.getElementById('err').textContent = 'Name not recognised. Try again.';
  }
}
</script>
</body>
</html>
