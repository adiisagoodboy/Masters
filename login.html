<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MSc Guide — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#07102A;--card:rgba(13,26,60,.9);--accent:#7B73F5;--text:#E8EEFF;--text2:#8B98C0;--border:rgba(123,115,245,.22);--err:#F87171;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);background-image:radial-gradient(circle at 30% 80%,rgba(123,115,245,.12) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(56,194,245,.1) 0%,transparent 50%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Outfit',system-ui,sans-serif;}
  .wrap{width:100%;max-width:400px;padding:20px;}
  .card{background:linear-gradient(135deg,rgba(13,24,56,.95),rgba(17,30,68,.95));border:1px solid var(--border);border-radius:20px;padding:40px 36px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .icon{font-size:2.8rem;text-align:center;margin-bottom:12px;}
  h1{font-size:1.4rem;font-weight:800;color:var(--text);text-align:center;margin-bottom:4px;letter-spacing:-.3px;}
  .sub{font-size:.84rem;color:var(--text2);text-align:center;margin-bottom:28px;}
  label{font-size:.76rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px;}
  input{width:100%;padding:12px 16px;font-size:1rem;border:1.5px solid var(--border);border-radius:10px;color:var(--text);background:rgba(255,255,255,.04);outline:none;transition:border .2s;font-family:inherit;}
  input:focus{border-color:var(--accent);background:rgba(123,115,245,.06);}
  input.shake{animation:shake .3s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .err{font-size:.8rem;color:var(--err);margin-top:8px;min-height:18px;text-align:center;}
  button{width:100%;margin-top:20px;padding:13px;background:linear-gradient(135deg,#6A63E8,#9A80F8);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;font-family:inherit;box-shadow:0 4px 18px rgba(106,99,232,.4);}
  button:hover{opacity:.88;}
  .hint{font-size:.74rem;color:var(--text2);text-align:center;margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="icon">🎓</div>
    <h1>MSc Global Guide</h1>
    <p class="sub">Aditya's personal university research — private access only</p>
    <label for="name">Enter your name to continue</label>
    <input type="text" id="name" placeholder="Type your name…" autocomplete="off" autocapitalize="none" onkeydown="if(event.key==='Enter')tryLogin()">
    <div class="err" id="err"></div>
    <button onclick="tryLogin()">Continue →</button>
    <p class="hint">Access is restricted to invited viewers only.</p>
  </div>
</div>
<script>
function tryLogin() {
  const val = document.getElementById('name').value.trim().toLowerCase();
  const allowed = ['aditya', 'dad', 'appa', 'papa'];
  if (allowed.includes(val)) {
    sessionStorage.setItem('msc-auth', '1');
    const params = new URLSearchParams(location.search);
    const next = params.get('next');
    location.replace(next && next.startsWith('http') ? next : 'MSc_Global_Guide.html');
  } else {
    const inp = document.getElementById('name');
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    document.getElementById('err').textContent = 'Name not recognised. Try again.';
  }
}
</script>
</body>
</html>
